  <pre id="err"></pre>
  <script>
    function showErr(msg){
      var e = document.getElementById('err');
      var c = document.getElementById('cargando');
      if (c) c.style.display = 'none';
      e.style.display = 'block';
      e.textContent = 'No se pudo iniciar la app:\n\n' + msg;
    }
    window.addEventListener('error', function(ev){
      showErr((ev.message || ev.error || ev) + (ev.filename ? '\n(' + ev.filename + ':' + ev.lineno + ')' : ''));
    });
    window.addEventListener('unhandledrejection', function(ev){
      showErr('Promesa rechazada: ' + (ev.reason && ev.reason.message ? ev.reason.message : ev.reason));
    });
    setTimeout(function(){
      if (!window.React || !window.Babel) {
        showErr('No se cargaron las librerías desde el CDN (React/Babel). Verificá la conexión a internet y recargá la página.');
      }
    }, 8000);
  </script>

function BeepWave({ pattern }) {
  let x = 6;
  const bw = 11, gap = 8, sh = 18, sy = 9;
  return (
    <svg width={160} height={36} aria-hidden="true" style={{ flexShrink:0 }}>
      <line x1={0} y1={18} x2={160} y2={18} stroke="#e5e7eb" strokeWidth={0.5}/>
      {pattern.map((w, i) => {
        const width = w > 1 ? w * bw : bw;
        const rect = <rect key={i} x={x} y={sy} width={width} height={sh} rx={2} fill="#1D9E75"/>;
        x += width + gap;
        return rect;
      })}
    </svg>
  );
}

function AITab({ pw }) {
  const SUGGESTIONS = ['F35=0, ¿qué significa?','Motor vibra a baja velocidad','Vehículo va en reversa al poner Forward','3 pitidos al encender','F53=792, ¿cuál es el voltaje real?','¿Qué parámetros revisar primero?'];
  const [messages, setMessages] = useState([
    { role:'assistant', content:'Hola. Soy el asistente especializado en la controladora Enpower MC3336-7240. Tengo precargados todos los parámetros y valores actuales del vehículo. Describe el síntoma o falla que estás diagnosticando.' }
  ]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const [dots, setDots] = useState('');
  const logRef = useRef(null);

  useEffect(() => {
    if (logRef.current) logRef.current.scrollTop = logRef.current.scrollHeight;
  }, [messages, loading]);

  useEffect(() => {
    if (!loading) { setDots(''); return; }
    const t = setInterval(() => setDots(d => d.length >= 3 ? '.' : d + '.'), 400);
    return () => clearInterval(t);
  }, [loading]);

  async function send(msg) {
    const text = (msg || input).trim();
    if (!text || loading) return;
    setInput('');
    const newMsgs = [...messages, { role:'user', content:text }];
    setMessages(newMsgs);
    setLoading(true);
    try {
      const apiMsgs = newMsgs.slice(1).map(m => ({ role:m.role, content:m.content }));
      const r = await fetch('/.netlify/functions/chat', {
        method:'POST',
        headers:{ 'Content-Type':'application/json' },
        body: JSON.stringify({ system:AI_SYSTEM, messages:apiMsgs, password:pw })
      });
      const d = await r.json();
      const reply = d.content?.map(c => c.text || '').join('')
        || (d.error?.message ? '⚠ ' + d.error.message : 'Error en la respuesta de la API.');
      setMessages([...newMsgs, { role:'assistant', content:reply }]);
    } catch {
      setMessages([...newMsgs, { role:'assistant', content:'⚠ Error de conexión. Verificar acceso a internet e intentar nuevamente.' }]);
    }
    setLoading(false);
  }

  return (
    <div style={{ padding:16 }}>
      <div style={{ border:'0.5px solid #e5e7eb', borderRadius:10, overflow:'hidden' }}>
        <div style={{ padding:'10px 14px', background:'#f9fafb', borderBottom:'0.5px solid #e5e7eb', display:'flex', alignItems:'center', gap:8 }}>
          <div style={{ width:8, height:8, borderRadius:'50%', background:'#1D9E75' }}/>
          <span style={{ fontSize:12, fontWeight:500 }}>IA Análisis — MC3336-7240</span>
          <span style={{ fontSize:11, color:'#9ca3af', marginLeft:'auto' }}>claude-sonnet-4-6</span>
        </div>
        <div ref={logRef} style={{ minHeight:320, maxHeight:380, overflowY:'auto', padding:14, display:'flex', flexDirection:'column', gap:8 }}>
          {messages.map((m, i) => (
            <div key={i} style={{ maxWidth:'90%', alignSelf: m.role==='user' ? 'flex-end' : 'flex-start' }}>
              {m.role==='assistant' && <div style={{ fontSize:11, color:'#1D9E75', fontWeight:500, marginBottom:3 }}>EVtronics IA</div>}
              <div style={{ padding:'10px 13px', borderRadius:10, fontSize:13, lineHeight:1.7, background: m.role==='user' ? '#dbeafe' : '#f3f4f6', color: m.role==='user' ? '#1e3a8a' : '#111827', whiteSpace:'pre-wrap' }}>
                {m.content}
              </div>
            </div>
          ))}
          {loading && (
            <div style={{ alignSelf:'flex-start' }}>
              <div style={{ fontSize:11, color:'#1D9E75', fontWeight:500, marginBottom:3 }}>EVtronics IA</div>
              <div style={{ padding:'10px 13px', borderRadius:10, background:'#f3f4f6', fontSize:13, color:'#6b7280' }}>Analizando{dots}</div>
            </div>
          )}
        </div>
        <div style={{ padding:'10px 14px', borderTop:'0.5px solid #e5e7eb', display:'flex', gap:8, alignItems:'flex-end' }}>
          <textarea value={input} onChange={e => setInput(e.target.value)}
            onKeyDown={e => { if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); send(); }}}
            rows={2} placeholder="Describe el síntoma o falla... (Enter para enviar)"
            style={{ flex:1, padding:'8px 12px', border:'0.5px solid #d1d5db', borderRadius:8, fontSize:13, resize:'none', outline:'none', fontFamily:'inherit', lineHeight:1.5 }}/>
          <button onClick={() => send()} disabled={loading}
            style={{ padding:'8px 16px', background: loading ? '#9ca3af' : '#1D9E75', border:'none', borderRadius:8, color:'white', cursor: loading ? 'not-allowed' : 'pointer', fontSize:13, height:36, flexShrink:0, fontWeight:500 }}>
            ↑ Enviar
          </button>
        </div>
      </div>
      <div style={{ marginTop:12 }}>
        <div style={{ fontSize:11, color:'#6b7280', marginBottom:6 }}>Preguntas rápidas:</div>
        <div style={{ display:'flex', flexWrap:'wrap', gap:6 }}>
          {SUGGESTIONS.map(q => (
            <button key={q} onClick={() => send(q)}
              style={{ padding:'4px 10px', border:'0.5px solid #d1d5db', borderRadius:16, background:'white', fontSize:11, cursor:'pointer', color:'#374151' }}>
              {q}
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

function Login({ onAuth }) {
  const [pw, setPw] = useState('');
  const [err, setErr] = useState('');
  const [loading, setLoading] = useState(false);

  async function submit() {
    if (!pw.trim() || loading) return;
    setLoading(true);
    setErr('');
    try {
      const r = await fetch('/.netlify/functions/chat', {
        method:'POST',
        headers:{ 'Content-Type':'application/json' },
        body: JSON.stringify({ verify:true, password:pw })
      });
      if (r.ok) {
        try { localStorage.setItem('ev_pw', pw); } catch (e) {}
        onAuth(pw);
      } else {
        setErr('Contraseña incorrecta.');
      }
    } catch (e) {
      setErr('Error de conexión. Intentá de nuevo.');
    }
    setLoading(false);
  }

  return (
    <div style={{ fontFamily:'system-ui, sans-serif', minHeight:'80vh', display:'flex', alignItems:'center', justifyContent:'center', padding:24 }}>
      <div style={{ width:'100%', maxWidth:320, textAlign:'center' }}>
        <div style={{ width:48, height:48, background:'#1D9E75', borderRadius:12, display:'flex', alignItems:'center', justifyContent:'center', color:'white', fontSize:24, margin:'0 auto 16px' }}>⚡</div>
        <div style={{ fontSize:18, fontWeight:600, marginBottom:4 }}>EVtronics Enpower</div>
        <div style={{ fontSize:13, color:'#6b7280', marginBottom:20 }}>Ingresá la contraseña para acceder</div>
        <input type="password" value={pw} onChange={e => setPw(e.target.value)}
          onKeyDown={e => { if (e.key === 'Enter') submit(); }}
          placeholder="Contraseña"
          style={{ width:'100%', padding:'10px 12px', border:'0.5px solid #d1d5db', borderRadius:8, fontSize:14, outline:'none', marginBottom:10 }}/>
        <button onClick={submit} disabled={loading}
          style={{ width:'100%', padding:'10px', background: loading ? '#9ca3af' : '#1D9E75', border:'none', borderRadius:8, color:'white', fontSize:14, fontWeight:500, cursor: loading ? 'not-allowed' : 'pointer' }}>
          {loading ? 'Verificando…' : 'Entrar'}
        </button>
        {err && <div style={{ marginTop:10, fontSize:12, color:'#b91c1c' }}>{err}</div>}
      </div>
    </div>
  );
}

const TABS = [
  { id:'params', label:'Parámetros',       icon:'⚙' },
  { id:'beeps',  label:'Códigos de Pitido', icon:'🔊' },
  { id:'faults', label:'Diagnóstico',       icon:'🔍' },
  { id:'ai',     label:'IA Análisis',       icon:'🤖' },
];

function App() {
  const [tab, setTab] = useState('params');
  const [pw, setPw] = useState(() => { try { return localStorage.getItem('ev_pw') || ''; } catch (e) { return ''; } });
  const [authed, setAuthed] = useState(() => { try { return !!localStorage.getItem('ev_pw'); } catch (e) { return false; } });

  function logout() {
    try { localStorage.removeItem('ev_pw'); } catch (e) {}
    setPw(''); setAuthed(false);
  }

  if (!authed) {
    return <Login onAuth={(p) => { setPw(p); setAuthed(true); }} />;
  }

  return (
    <div style={{ fontFamily:'system-ui, sans-serif', color:'#111827', maxWidth:'100%' }}>
      <div style={{ padding:'14px 16px 0', borderBottom:'0.5px solid #e5e7eb' }}>
        <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:4 }}>
          <div style={{ width:30, height:30, background:'#1D9E75', borderRadius:8, display:'flex', alignItems:'center', justifyContent:'center', color:'white', fontSize:16, flexShrink:0 }}>⚡</div>
          <div style={{ flex:1 }}>
            <div style={{ fontSize:15, fontWeight:500 }}>EVtronics <span style={{ color:'#1D9E75' }}>Enpower</span></div>
            <div style={{ fontSize:10, color:'#9ca3af', fontFamily:'monospace' }}>MC3336-7240 · 72V · 400A · AC Vectorial · IP68</div>
          </div>
          <button onClick={logout} title="Salir"
            style={{ border:'0.5px solid #e5e7eb', background:'white', color:'#6b7280', borderRadius:8, padding:'5px 10px', fontSize:11, cursor:'pointer', flexShrink:0 }}>
            Salir
          </button>
        </div>
        <div style={{ display:'flex', overflowX:'auto' }}>
          {TABS.map(t => (
            <button key={t.id} onClick={() => setTab(t.id)}
              style={{ padding:'9px 14px', border:'none', background:'transparent', cursor:'pointer', fontSize:12, fontWeight: tab===t.id ? 500 : 400, color: tab===t.id ? '#1D9E75' : '#6b7280', borderBottom:`2px solid ${tab===t.id ? '#1D9E75' : 'transparent'}`, whiteSpace:'nowrap', transition:'all .15s' }}>
              {t.icon} {t.label}
            </button>
          ))}
        </div>
      </div>
      {tab === 'params' && <ParamsTab/>}
      {tab === 'beeps'  && <BeepsTab/>}
      {tab === 'faults' && <FaultsTab/>}
      {tab === 'ai'     && <AITab pw={pw}/>}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
  </script>
</body>
